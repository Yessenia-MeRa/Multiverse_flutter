name: login
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.5
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  font_awesome_flutter: ^10.12.0
  google_sign_in: ^7.2.0
  cupertino_icons: ^1.0.8
  flutter_staggered_grid_view: ^0.7.0
  go_router: ^7.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Ballet
      fonts:
        - asset: fonts/Ballet-Regular-VariableFont_opsz.ttf
    - family: MomoS
      fonts:
        - asset: fonts/MomoSignature-Regular.ttf
    - family: Raleway
      fonts:
        - asset: fonts/Raleway-Italic-VariableFont_wght.ttf